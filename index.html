  const parseVoiceAmount = (text) => {
    // 1. Direct number in text (e.g. "قهوة 15.5" or "coffee 7.50")
    const numMatch = text.match(/[\d٠-٩]+[.,٫]?[\d٠-٩]*/g);
    if(numMatch){
      // Convert Arabic-Indic digits to Western
      const normalized = numMatch[numMatch.length-1]
        .replace(/[٠١٢٣٤٥٦٧٨٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d))
        .replace('،','.')
        .replace(',','.');
      const val = parseFloat(normalized);
      if(!isNaN(val)) return { amount: String(val), name: text.replace(numMatch[numMatch.length-1],'').trim() };
    }

    // 2. Arabic fractional words
    const arMap = {
      'صفر':0,'واحد':1,'اثنين':2,'اثنان':2,'ثلاثة':3,'أربعة':4,'خمسة':5,
      'ستة':6,'سبعة':7,'ثمانية':8,'تسعة':9,'عشرة':10,'أحد عشر':11,
      'اثنا عشر':12,'خمسة عشر':15,'عشرين':20,'خمسة وعشرين':25,
      'ثلاثين':30,'أربعين':40,'خمسين':50,'ستين':60,'سبعين':70,
      'ثمانين':80,'تسعين':90,'مية':100,'مئة':100,'مائة':100,
      'مية وخمسين':150,'مئتين':200,'خمسمية':500,'ألف':1000,
    };
    const arFrac = {'نصف':0.5,'ربع':0.25,'ثلث':0.333,'ثلاثة أرباع':0.75};

    let amount = null;
    let cleanText = text;

    // Check for fraction words
    for(const [word, val] of Object.entries(arFrac)){
      if(text.includes(word)){
        // Find the integer part before it
        for(const [intWord, intVal] of Object.entries(arMap)){
          if(text.includes(intWord)){
            amount = intVal + val;
            cleanText = text.replace(intWord,'').replace(word,'').replace('و','').trim();
            break;
          }
        }
        if(amount === null){ amount = val; cleanText = text.replace(word,'').trim(); }
        break;
      }
    }

    // Check for pure integer words
    if(amount === null){
      for(const [word, val] of Object.entries(arMap)){
        if(text.includes(word)){
          amount = val;
          cleanText = text.replace(word,'').trim();
          break;
        }
      }
    }

    // 3. English words
    const enMap = {
      'zero':0,'one':1,'two':2,'three':3,'four':4,'five':5,'six':6,'seven':7,
      'eight':8,'nine':9,'ten':10,'eleven':11,'twelve':12,'thirteen':13,
      'fourteen':14,'fifteen':15,'sixteen':16,'seventeen':17,'eighteen':18,
      'nineteen':19,'twenty':20,'thirty':30,'forty':40,'fifty':50,'sixty':60,
      'seventy':70,'eighty':80,'ninety':90,'hundred':100,'thousand':1000,
    };
    const enFrac = {'half':0.5,'quarter':0.25,'point five':0.5,'and a half':0.5};

    if(amount === null){
      const ltext = text.toLowerCase();
      for(const [word, val] of Object.entries(enFrac)){
        if(ltext.includes(word)){
          for(const [intWord, intVal] of Object.entries(enMap)){
            if(ltext.includes(intWord)){
              amount = intVal + val;
              cleanText = text.replace(new RegExp(intWord,'gi'),'').replace(new RegExp(word,'gi'),'').trim();
              break;
            }
          }
          if(amount === null){ amount = val; cleanText = text.replace(new RegExp(word,'gi'),'').trim(); }
          break;
        }
      }
      // "point X" pattern e.g. "twenty point five"
      const pointMatch = ltext.match(/(\w+)\s+point\s+(\w+)/);
      if(pointMatch && amount === null){
        const intPart = _nullishCoalesce(enMap[pointMatch[1]], () => ( 0));
        const decPart = _nullishCoalesce(enMap[pointMatch[2]], () => ( parseFloat(pointMatch[2])));
        amount = intPart + decPart/10;
        cleanText = text.replace(pointMatch[0],'').trim();
      }
    }

    if(amount !== null) return { amount: String(Math.round(amount*100)/100), name: cleanText||text };
    return null;
  };

  // Safe math parser - no eval()
  const safeMath = (expr) => {
    // Allow only numbers and operators
    const clean = expr.replace(/[^0-9+\-*/().]/g, '');
    if(!clean) return NaN;
    // Recursive descent parser
    const tokens = clean.match(/\d+\.?\d*|[+\-*/()]/g) || [];
    let pos = 0;
    const peek = () => tokens[pos];
    const consume = () => tokens[pos++];
    const parseNum = () => {
      if(peek() === '(') { consume(); const v = parseExpr(); consume(); return v; }
      const t = consume();
      return t !== undefined ? parseFloat(t) : NaN;
    };
    const parseMul = () => {
      let left = parseNum();
      while(peek() === '*' || peek() === '/') {
        const op = consume();
        const right = parseNum();
        left = op === '*' ? left * right : right !== 0 ? left / right : NaN;
      }
      return left;
    };
    const parseExpr = () => {
      let left = parseMul();
      while(peek() === '+' || peek() === '-') {
        const op = consume();
        const right = parseMul();
        left = op === '+' ? left + right : left - right;
      }
      return left;
    };
    try { const result = parseExpr(); return isFinite(result) ? result : NaN; }

    const getWeekData=()=>{

        const inc=expenses.filter(e=>{ const dd=new Date(e.date); return dd.toDateString()===d.toDateString()&&e.type==="income"; }).reduce((s,e)=>s+e.amount,0);
        return {label:isRTL?days[d.getDay()]:daysEn[d.getDay()], exp, inc};
      });
    };

    const getMonthData=()=>{
      const now=new Date(); const weeks=4;
      return Array.from({length:weeks},(_,i)=>{
        const start=new Date(now.getFullYear(),now.getMonth(),1+(i*7));
        const end=new Date(now.getFullYear(),now.getMonth(),Math.min(7+(i*7),new Date(now.getFullYear(),now.getMonth()+1,0).getDate()));
        const exp=expenses.filter(e=>{ const d=new Date(e.date); return d>=start&&d<=end&&e.type==="expense"; }).reduce((s,e)=>s+e.amount,0);
        const inc=expenses.filter(e=>{ const d=new Date(e.date); return d>=start&&d<=end&&e.type==="income"; }).reduce((s,e)=>s+e.amount,0);
        return {label:`${isRTL?"أ":"W"}${i+1}`, exp, inc};
      });
    };

    const getYearData=()=>{
      const monthsAr=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
      const monthsEn=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

        const exp=expenses.filter(e=>{ const d=new Date(e.date); return d.getMonth()===i&&d.getFullYear()===y&&e.type==="expense"; }).reduce((s,e)=>s+e.amount,0);
        const inc=expenses.filter(e=>{ const d=new Date(e.date); return d.getMonth()===i&&d.getFullYear()===y&&e.type==="income"; }).reduce((s,e)=>s+e.amount,0);
        return {label:isRTL?monthsAr[i]:monthsEn[i], exp, inc};
